<!DOCTYPE html>
<!-- Calendario La Esquina - version GitHub — calendario móvil con notas, tareas, voz y Claude integrado -->
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>La Esquina</title>
<meta name="theme-color" content="#131a22">
<link rel="apple-touch-icon" id="ati">
<link rel="icon" id="fav">
<link rel="manifest" id="mf">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Instrument+Sans:wght@400;500;600;700&display=swap');

  :root {
    --tinta: #131a22;
    --tinta-2: #1b2430;
    --tinta-3: #242f3d;
    --lona: #f2ead9;
    --lona-suave: #c8c2b4;
    --cuerda: #e23b4e;
    --oro: #e8b664;
    --verde: #5fb27a;
    --radio: 14px;
    --display: 'Anton', sans-serif;
    --cuerpo: 'Instrument Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    font-family: var(--cuerpo);
    background: var(--tinta);
    color: var(--lona);
    max-width: 460px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  button { font-family: var(--cuerpo); cursor: pointer; border: none; background: none; color: inherit; }
  button:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--oro);
    outline-offset: 2px;
  }

  /* ── Cabecera tipo cartel ───────────────────────── */
  header {
    padding: 20px 18px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .mes-bloque { min-width: 0; }
  .anio {
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--oro);
    font-weight: 600;
  }
  h1 {
    font-family: var(--display);
    font-size: clamp(40px, 13vw, 58px);
    line-height: 0.95;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--lona);
  }
  .nav-mes { display: flex; gap: 8px; flex-shrink: 0; }
  .nav-mes button {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--tinta-2);
    color: var(--lona);
    font-size: 20px;
    display: grid; place-items: center;
    transition: background .15s;
  }
  .nav-mes button:active { background: var(--tinta-3); }

  /* ── Rejilla del calendario ─────────────────────── */
  .semana-cabecera {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 6px 14px 4px;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--lona-suave);
  }
  .rejilla {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    padding: 0 14px 10px;
  }
  .dia {
    min-height: 64px;
    border-radius: 10px;
    background: var(--tinta-2);
    color: var(--lona);
    font-weight: 600;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 4px 3px 3px;
    overflow: hidden;
    transition: background .15s, transform .1s;
  }
  .dia .num {
    font-size: 12px;
    line-height: 1.2;
    padding-left: 3px;
    text-align: left;
  }
  .dia:active { transform: scale(.94); }
  .dia.vacio { background: transparent; pointer-events: none; }
  .dia.hoy { box-shadow: inset 0 0 0 2px var(--oro); color: var(--oro); }
  .dia.seleccionado { background: var(--lona); color: var(--tinta); }
  .dia .punto {
    position: absolute;
    top: 5px; right: 5px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--oro);
  }
  .chip {
    display: block;
    font-size: 8px;
    font-weight: 700;
    line-height: 1.3;
    padding: 1px 3px;
    border-radius: 4px;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: left;
  }
  .chip.mas { background: none; color: var(--lona-suave); padding: 0 3px; }
  .chip.hecha { opacity: .4; text-decoration: line-through; }
  .cat-deporte { background: var(--cuerda); color: #fff; }
  .cat-boda { background: var(--lona); color: var(--tinta); }
  .cat-laboral { background: var(--verde); color: var(--tinta); }
  .cat-otros { background: var(--oro); color: var(--tinta); }
  .dia.seleccionado .cat-boda { outline: 1px solid var(--tinta-3); }

  .leyenda {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 2px 14px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--lona-suave);
  }
  .leyenda i {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 3px;
    margin-right: 4px;
  }

  /* ── Panel del día ──────────────────────────────── */
  .panel-dia {
    flex: 1;
    background: var(--tinta-2);
    border-radius: var(--radio) var(--radio) 0 0;
    padding: 18px 18px 110px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: subir .25s ease both;
  }
  @keyframes subir { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .panel-dia h2 {
    font-family: var(--display);
    font-size: 20px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--oro);
    font-weight: 400;
  }

  .seccion-titulo {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--lona-suave);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .seccion-titulo::after { content: ''; flex: 1; height: 1px; background: var(--tinta-3); }

  .lista { display: flex; flex-direction: column; gap: 8px; }
  .vacio-msg { font-size: 14px; color: var(--lona-suave); padding: 4px 0; }

  .tarea, .nota {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--tinta);
    border-radius: 10px;
    padding: 11px 12px;
    font-size: 15px;
    line-height: 1.35;
  }
  .tarea .check {
    width: 24px; height: 24px;
    min-width: 24px;
    border-radius: 7px;
    border: 2px solid var(--lona-suave);
    display: grid; place-items: center;
    font-size: 14px;
    color: var(--tinta);
    margin-top: 1px;
  }
  .tarea.hecha .check { background: var(--verde); border-color: var(--verde); }
  .tarea.hecha .texto { text-decoration: line-through; color: var(--lona-suave); }
  .tarea .texto, .nota .texto { flex: 1; word-break: break-word; }
  .nota { border-left: 3px solid var(--oro); }
  .tarea.b-deporte { border-left: 3px solid var(--cuerda); }
  .tarea.b-boda { border-left: 3px solid var(--lona); }
  .tarea.b-laboral { border-left: 3px solid var(--verde); }
  .tarea.b-otros { border-left: 3px solid var(--oro); }
  .tarea .cuerpo-tarea { flex: 1; min-width: 0; }
  .tarea .chevron { color: var(--lona-suave); font-size: 12px; }
  .tarea .detalle {
    display: none;
    font-size: 13px;
    color: var(--lona-suave);
    line-height: 1.5;
    margin-top: 7px;
    padding-top: 7px;
    border-top: 1px dashed var(--tinta-3);
    white-space: pre-wrap;
  }
  .tarea.abierta .detalle { display: block; }
  .cat-sel {
    min-width: 40px;
    border-radius: 10px;
    border: 1px solid var(--tinta-3);
    background: var(--tinta);
    display: grid;
    place-items: center;
  }
  .cat-sel i { width: 15px; height: 15px; border-radius: 5px; display: block; }
  .borrar {
    color: var(--lona-suave);
    font-size: 16px;
    padding: 2px 6px;
    min-width: 32px;
    min-height: 32px;
  }
  .borrar:active { color: var(--cuerda); }

  .fila-añadir { display: flex; gap: 8px; margin-top: 8px; }
  .fila-añadir input {
    flex: 1;
    background: var(--tinta);
    border: 1px solid var(--tinta-3);
    border-radius: 10px;
    padding: 12px;
    font-family: var(--cuerpo);
    font-size: 16px;
    color: var(--lona);
    min-width: 0;
  }
  .fila-añadir input::placeholder { color: var(--lona-suave); opacity: .7; }
  .fila-añadir button {
    background: var(--cuerda);
    color: #fff;
    border-radius: 10px;
    padding: 0 16px;
    font-weight: 700;
    font-size: 20px;
    min-width: 48px;
  }
  .fila-añadir button:active { filter: brightness(.85); }

  /* ── Botón La Esquina ───────────────────────────── */
  .boton-esquina {
    position: fixed;
    bottom: 18px;
    left: 0;
    right: 0;
    margin: 0 auto;
    width: fit-content;
    background: var(--cuerda);
    color: #fff;
    font-family: var(--display);
    font-size: 17px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 30px;
    border-radius: 999px;
    box-shadow: 0 6px 24px rgba(226, 59, 78, .45);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 40;
  }
  .boton-esquina:active { transform: scale(.96); }
  .campana { font-size: 18px; }

  /* ── Chat La Esquina ────────────────────────────── */
  .esquina-overlay {
    position: fixed;
    inset: 0;
    background: rgba(9, 13, 18, .6);
    backdrop-filter: blur(3px);
    z-index: 50;
    display: none;
  }
  .esquina-overlay.abierto { display: block; }
  .esquina {
    position: fixed;
    left: 0;
    right: 0;
    margin: 0 auto;
    bottom: 0;
    width: 100%;
    max-width: 460px;
    height: 82dvh;
    background: var(--tinta-2);
    border-radius: 20px 20px 0 0;
    z-index: 60;
    display: none;
    flex-direction: column;
    animation: subir .25s ease both;
  }
  .esquina.abierto { display: flex; }
  .esquina-cabecera {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px 10px;
    border-bottom: 1px solid var(--tinta-3);
  }
  .esquina-cabecera h2 {
    font-family: var(--display);
    font-size: 22px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cuerda);
    font-weight: 400;
  }
  .esquina-cabecera small {
    display: block;
    font-family: var(--cuerpo);
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--lona-suave);
    text-transform: none;
    margin-top: 2px;
  }
  .cerrar-esquina {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--tinta-3);
    color: var(--lona);
    font-size: 18px;
  }

  .mensajes {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 85%;
    padding: 11px 14px;
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.usuario {
    align-self: flex-end;
    background: var(--cuerda);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.claude {
    align-self: flex-start;
    background: var(--tinta);
    border-bottom-left-radius: 4px;
  }
  .msg.sistema {
    align-self: center;
    background: none;
    color: var(--oro);
    font-size: 13px;
    text-align: center;
  }
  .escribiendo {
    align-self: flex-start;
    color: var(--lona-suave);
    font-size: 14px;
    padding: 8px 14px;
  }
  .escribiendo span { animation: parpadeo 1.2s infinite; }
  .escribiendo span:nth-child(2) { animation-delay: .2s; }
  .escribiendo span:nth-child(3) { animation-delay: .4s; }
  @keyframes parpadeo { 0%, 60%, 100% { opacity: .3; } 30% { opacity: 1; } }

  .esquina-input {
    display: flex;
    gap: 8px;
    padding: 12px 14px calc(14px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--tinta-3);
  }
  .esquina-input textarea {
    flex: 1;
    background: var(--tinta);
    border: 1px solid var(--tinta-3);
    border-radius: 12px;
    padding: 12px;
    font-family: var(--cuerpo);
    font-size: 16px;
    color: var(--lona);
    resize: none;
    height: 48px;
    min-width: 0;
  }
  .esquina-input button {
    background: var(--oro);
    color: var(--tinta);
    border-radius: 12px;
    padding: 0 18px;
    font-weight: 700;
    font-size: 15px;
    min-width: 70px;
  }
  .esquina-input button:disabled { opacity: .5; }
  .esquina-input .mic {
    background: var(--tinta);
    color: var(--lona);
    border: 1px solid var(--tinta-3);
    min-width: 48px;
    padding: 0;
    font-size: 19px;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .esquina-input .mic.grabando {
    background: var(--cuerda);
    color: #fff;
    border-color: var(--cuerda);
    animation: pulso 1s infinite;
  }
  @keyframes pulso { 50% { opacity: .55; } }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
  .titulo-esquina { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .logo-esquina { width: 46px; height: auto; flex-shrink: 0; filter: drop-shadow(0 2px 6px rgba(226,59,78,.35)); }
</style>
</head>
<body>

<header>
  <div class="titulo-esquina">
    <img class="logo-esquina" id="logo" alt="La Esquina">
    <div class="mes-bloque">
      <div class="anio" id="anio"></div>
      <h1 id="mes"></h1>
    </div>
  </div>
  <div class="nav-mes">
    <button id="mes-prev" aria-label="Mes anterior">‹</button>
    <button id="mes-sig" aria-label="Mes siguiente">›</button>
  </div>
</header>

<div class="semana-cabecera">
  <span>L</span><span>M</span><span>X</span><span>J</span><span>V</span><span>S</span><span>D</span>
</div>
<div class="rejilla" id="rejilla"></div>
<div class="leyenda">
  <span><i class="cat-deporte"></i>Deporte</span>
  <span><i class="cat-boda"></i>Boda</span>
  <span><i class="cat-laboral"></i>Laboral</span>
  <span><i class="cat-otros"></i>Otros</span>
</div>

<section class="panel-dia" id="panel-dia">
  <h2 id="titulo-dia"></h2>

  <div>
    <div class="seccion-titulo">Tareas</div>
    <div class="lista" id="lista-tareas"></div>
    <div class="fila-añadir">
      <button class="cat-sel" id="cat-sel" aria-label="Cambiar categoría de la nueva tarea"><i id="cat-sel-i" class="cat-otros"></i></button>
      <input id="input-tarea" type="text" placeholder="Nueva tarea…" autocomplete="off" />
      <button id="btn-tarea" aria-label="Añadir tarea">+</button>
    </div>
  </div>

  <div>
    <div class="seccion-titulo">Notas</div>
    <div class="lista" id="lista-notas"></div>
    <div class="fila-añadir">
      <input id="input-nota" type="text" placeholder="Nueva nota…" autocomplete="off" />
      <button id="btn-nota" aria-label="Añadir nota">+</button>
    </div>
  </div>
</section>

<button class="boton-esquina" id="abrir-esquina">
  <span class="campana">🔔</span> La Esquina
</button>

<div class="esquina-overlay" id="esquina-overlay"></div>
<div class="esquina" id="esquina" role="dialog" aria-label="Chat con Claude">
  <div class="esquina-cabecera">
    <h2>La Esquina<small>Versión GitHub · voz activa</small></h2>
    <button class="cerrar-esquina" id="cerrar-esquina" aria-label="Cerrar chat">✕</button>
  </div>
  <div class="mensajes" id="mensajes"></div>
  <div class="esquina-input">
    <textarea id="input-chat" placeholder="Dime qué organizamos…" rows="1"></textarea>
    <button id="btn-mic" class="mic" aria-label="Dictar por voz">🎙</button>
    <button id="btn-enviar">Enviar</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ══════════════════════════════════════════════════════════════
  //  CONFIGURACIÓN — PEGA AQUÍ LA URL DE TU WORKER DE CLOUDFLARE
  //  La sacas al crear el Worker: https://esquina-proxy.xxxx.workers.dev
  //  Aquí NO va ninguna clave: la clave vive escondida en Cloudflare.
  const PROXY_URL = 'https://pablodemora--763046f676d511f1a08d1607ee4eb77e.web.val.run';
  //  Modelo. Haiku es rápido y barato — perfecto para comandos de calendario.
  //  Para rutinas más elaboradas, cámbialo a: 'claude-sonnet-4-6'
  const MODELO = 'claude-haiku-4-5-20251001';
  // ══════════════════════════════════════════════════════════════

  const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DIAS_SEM = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const CLAVE = 'esquina-calendario-v1';

  // Estado: { tasks: {fecha:[{id,text,done}]}, notes: {fecha:[{id,text}]}, chat: [{role,content}] }
  let datos = { tasks: {}, notes: {}, chat: [] };
  const hoy = new Date();
  let vista = { anio: hoy.getFullYear(), mes: hoy.getMonth() };
  let seleccionado = clave(hoy);
  let cargado = false;

  function clave(d) {
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + m + '-' + dd;
  }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function esc(t) {
    const div = document.createElement('div');
    div.textContent = t;
    return div.innerHTML;
  }

  // ── Persistencia (almacenamiento local del navegador) ─────────
  function cargar() {
    try {
      const raw = localStorage.getItem(CLAVE);
      if (raw) {
        const p = JSON.parse(raw);
        datos.tasks = p.tasks || {};
        datos.notes = p.notes || {};
        datos.chat = Array.isArray(p.chat) ? p.chat : [];
      }
    } catch (e) { /* primera vez: no hay nada guardado */ }
    cargado = true;
    render();
    renderChat();
  }
  function guardar() {
    try {
      const copia = { tasks: datos.tasks, notes: datos.notes, chat: datos.chat.slice(-30) };
      localStorage.setItem(CLAVE, JSON.stringify(copia));
    } catch (e) { console.error('Error al guardar', e); }
  }

  // ── Render del calendario ─────────────────────────
  function render() {
    document.getElementById('anio').textContent = vista.anio;
    document.getElementById('mes').textContent = MESES[vista.mes];

    const rejilla = document.getElementById('rejilla');
    rejilla.innerHTML = '';

    const primero = new Date(vista.anio, vista.mes, 1);
    // Lunes = 0
    let offset = (primero.getDay() + 6) % 7;
    const diasMes = new Date(vista.anio, vista.mes + 1, 0).getDate();
    const hoyClave = clave(new Date());

    for (let i = 0; i < offset; i++) {
      const v = document.createElement('div');
      v.className = 'dia vacio';
      rejilla.appendChild(v);
    }
    for (let d = 1; d <= diasMes; d++) {
      const fecha = new Date(vista.anio, vista.mes, d);
      const k = clave(fecha);
      const btn = document.createElement('button');
      btn.className = 'dia';
      btn.setAttribute('aria-label', d + ' de ' + MESES[vista.mes]);
      if (k === hoyClave) btn.classList.add('hoy');
      if (k === seleccionado) btn.classList.add('seleccionado');

      const num = document.createElement('span');
      num.className = 'num';
      num.textContent = d;
      btn.appendChild(num);

      const tareas = datos.tasks[k] || [];
      const notas = datos.notes[k] || [];
      if (notas.length) {
        const p = document.createElement('span');
        p.className = 'punto';
        btn.appendChild(p);
      }
      tareas.slice(0, 3).forEach(t => {
        const c = document.createElement('span');
        c.className = 'chip cat-' + (t.cat || 'otros') + (t.done ? ' hecha' : '');
        c.textContent = t.text;
        btn.appendChild(c);
      });
      if (tareas.length > 3) {
        const m = document.createElement('span');
        m.className = 'chip mas';
        m.textContent = '+' + (tareas.length - 3);
        btn.appendChild(m);
      }
      btn.addEventListener('click', () => { seleccionado = k; render(); });
      rejilla.appendChild(btn);
    }
    renderDia();
  }

  function renderDia() {
    const [a, m, d] = seleccionado.split('-').map(Number);
    const fecha = new Date(a, m - 1, d);
    document.getElementById('titulo-dia').textContent =
      DIAS_SEM[fecha.getDay()] + ' ' + d + ' de ' + MESES[m - 1];

    const lt = document.getElementById('lista-tareas');
    const ln = document.getElementById('lista-notas');
    lt.innerHTML = '';
    ln.innerHTML = '';

    const tareas = datos.tasks[seleccionado] || [];
    const notas = datos.notes[seleccionado] || [];

    if (!tareas.length) lt.innerHTML = '<div class="vacio-msg">Sin tareas. Añade una abajo o pídesela a La Esquina.</div>';
    tareas.forEach(t => {
      const cat = t.cat || 'otros';
      const el = document.createElement('div');
      el.className = 'tarea b-' + cat + (t.done ? ' hecha' : '');
      el.innerHTML =
        '<button class="check" aria-label="Marcar tarea">' + (t.done ? '✓' : '') + '</button>' +
        '<div class="cuerpo-tarea">' +
          '<span class="texto">' + esc(t.text) + (t.detail ? ' <span class="chevron">▾</span>' : '') + '</span>' +
          (t.detail ? '<div class="detalle">' + esc(t.detail) + '</div>' : '') +
        '</div>' +
        '<button class="borrar" aria-label="Borrar tarea">✕</button>';
      el.querySelector('.check').addEventListener('click', () => {
        t.done = !t.done; guardar(); render();
      });
      if (t.detail) {
        el.querySelector('.cuerpo-tarea').addEventListener('click', () => {
          el.classList.toggle('abierta');
        });
      }
      el.querySelector('.borrar').addEventListener('click', () => {
        datos.tasks[seleccionado] = tareas.filter(x => x.id !== t.id);
        if (!datos.tasks[seleccionado].length) delete datos.tasks[seleccionado];
        guardar(); render();
      });
      lt.appendChild(el);
    });

    if (!notas.length) ln.innerHTML = '<div class="vacio-msg">Sin notas para este día.</div>';
    notas.forEach(n => {
      const el = document.createElement('div');
      el.className = 'nota';
      el.innerHTML =
        '<span class="texto">' + esc(n.text) + '</span>' +
        '<button class="borrar" aria-label="Borrar nota">✕</button>';
      el.querySelector('.borrar').addEventListener('click', () => {
        datos.notes[seleccionado] = notas.filter(x => x.id !== n.id);
        if (!datos.notes[seleccionado].length) delete datos.notes[seleccionado];
        guardar(); render();
      });
      ln.appendChild(el);
    });
  }

  // ── Añadir manual ─────────────────────────────────
  const CATS = ['deporte', 'boda', 'laboral', 'otros'];
  let catNueva = 'otros';
  const catSelI = document.getElementById('cat-sel-i');
  document.getElementById('cat-sel').addEventListener('click', () => {
    catNueva = CATS[(CATS.indexOf(catNueva) + 1) % CATS.length];
    catSelI.className = 'cat-' + catNueva;
  });

  function añadirTarea() {
    const inp = document.getElementById('input-tarea');
    const txt = inp.value.trim();
    if (!txt) return;
    (datos.tasks[seleccionado] = datos.tasks[seleccionado] || []).push({ id: uid(), text: txt, done: false, cat: catNueva, detail: '' });
    inp.value = '';
    guardar(); render();
  }
  function añadirNota() {
    const inp = document.getElementById('input-nota');
    const txt = inp.value.trim();
    if (!txt) return;
    (datos.notes[seleccionado] = datos.notes[seleccionado] || []).push({ id: uid(), text: txt });
    inp.value = '';
    guardar(); render();
  }
  document.getElementById('btn-tarea').addEventListener('click', añadirTarea);
  document.getElementById('btn-nota').addEventListener('click', añadirNota);
  document.getElementById('input-tarea').addEventListener('keydown', e => { if (e.key === 'Enter') añadirTarea(); });
  document.getElementById('input-nota').addEventListener('keydown', e => { if (e.key === 'Enter') añadirNota(); });

  // ── Navegación de mes ─────────────────────────────
  document.getElementById('mes-prev').addEventListener('click', () => {
    vista.mes--; if (vista.mes < 0) { vista.mes = 11; vista.anio--; }
    render();
  });
  document.getElementById('mes-sig').addEventListener('click', () => {
    vista.mes++; if (vista.mes > 11) { vista.mes = 0; vista.anio++; }
    render();
  });

  // ── Chat La Esquina ───────────────────────────────
  const overlay = document.getElementById('esquina-overlay');
  const esquina = document.getElementById('esquina');
  const mensajesEl = document.getElementById('mensajes');
  const inputChat = document.getElementById('input-chat');
  const btnEnviar = document.getElementById('btn-enviar');

  let agendaMostrada = false;
  document.getElementById('abrir-esquina').addEventListener('click', () => {
    overlay.classList.add('abierto');
    esquina.classList.add('abierto');
    if (!agendaMostrada) {
      const k = clave(new Date());
      const pend = (datos.tasks[k] || []).filter(t => !t.done);
      if (pend.length) {
        pintarMsg('sistema', '📋 Hoy tienes ' + pend.length + (pend.length === 1 ? ' tarea pendiente: ' : ' tareas pendientes: ') + pend.map(t => t.text).join(' · '));
      }
      agendaMostrada = true;
    }
    mensajesEl.scrollTop = mensajesEl.scrollHeight;
  });
  function cerrarChat() {
    overlay.classList.remove('abierto');
    esquina.classList.remove('abierto');
  }
  document.getElementById('cerrar-esquina').addEventListener('click', cerrarChat);
  overlay.addEventListener('click', cerrarChat);

  function renderChat() {
    mensajesEl.innerHTML = '';
    if (!datos.chat.length) {
      const b = document.createElement('div');
      b.className = 'msg sistema';
      b.textContent = 'Aquí puedes hablar con Claude en lenguaje natural: "añade entrenamiento el viernes", "organízame la semana", "borra las tareas hechas de julio".';
      mensajesEl.appendChild(b);
    }
    datos.chat.forEach(m => pintarMsg(m.role === 'user' ? 'usuario' : 'claude', m.content));
    mensajesEl.scrollTop = mensajesEl.scrollHeight;
  }
  function pintarMsg(tipo, texto) {
    const el = document.createElement('div');
    el.className = 'msg ' + tipo;
    el.textContent = texto;
    mensajesEl.appendChild(el);
    mensajesEl.scrollTop = mensajesEl.scrollHeight;
    return el;
  }

  function contextoCalendario() {
    // Solo enviar datos de los próximos 45 días para no sobrecargar el prompt
    const hoy = new Date();
    const limite = new Date(hoy);
    limite.setDate(limite.getDate() + 45);
    const inicio = new Date(hoy);
    inicio.setDate(inicio.getDate() - 7);
    const tareasRelevantes = {};
    const notasRelevantes = {};
    Object.keys(datos.tasks).forEach(k => {
      const d = new Date(k + 'T12:00:00');
      if (d >= inicio && d <= limite) tareasRelevantes[k] = datos.tasks[k];
    });
    Object.keys(datos.notes).forEach(k => {
      const d = new Date(k + 'T12:00:00');
      if (d >= inicio && d <= limite) notasRelevantes[k] = datos.notes[k];
    });
    return JSON.stringify({ tareas: tareasRelevantes, notas: notasRelevantes });
  }

  function construirPrompt(mensajeUsuario) {
    const hoyStr = clave(new Date());
    return 'Asistente del calendario "La Esquina". Usuario: Pablo (español, boxeador, experiencia en fitness).\n' +
      'HOY: ' + hoyStr + '\n' +
      'CALENDARIO (JSON, próximos 45 días):\n' + contextoCalendario() + '\n\n' +
      'Tarea: {id,text,done,cat,detail}. cat: deporte|boda|laboral|otros. detail: anotación opcional.\n' +
      'Nota: {id,text}.\n\n' +
      'MENSAJE: "' + mensajeUsuario.replace(/"/g, '\\"') + '"\n\n' +
      'Responde SOLO JSON:\n' +
      '{"reply":"texto breve","actions":[{"type":"add_task|update_task|remove_task|toggle_task|add_note|remove_note","date":"AAAA-MM-DD",...}]}\n\n' +
      'Reglas: actions vacío si solo conversa. Tareas simples: ejecútalas directo. Rutinas/entrenamientos: PASO 1 propón en reply sin actions; PASO 2 al confirmar, ejecuta con detail. Asigna cat por contenido. En detail usa \\n, no saltos reales. Ambiguo sin fecha: pregunta. Sé conciso.';
  }

  function aplicarAcciones(acciones) {
    let cambios = 0;
    (acciones || []).forEach(a => {
      try {
      if (!a || !a.date) return;
      if (a.type === 'add_task' && a.text) {
        (datos.tasks[a.date] = datos.tasks[a.date] || []).push({
          id: uid(),
          text: String(a.text),
          done: false,
          cat: CATS.includes(a.cat) ? a.cat : 'otros',
          detail: a.detail ? String(a.detail) : ''
        });
        cambios++;
      } else if (a.type === 'update_task' && a.id && datos.tasks[a.date]) {
        const t = datos.tasks[a.date].find(x => x.id === a.id);
        if (t) {
          if (a.text) t.text = String(a.text);
          if (CATS.includes(a.cat)) t.cat = a.cat;
          if (a.detail !== undefined && a.detail !== null) t.detail = String(a.detail);
          if (typeof a.done === 'boolean') t.done = a.done;
          cambios++;
        }
      } else if (a.type === 'remove_task' && a.id && datos.tasks[a.date]) {
        const antes = datos.tasks[a.date].length;
        datos.tasks[a.date] = datos.tasks[a.date].filter(t => t.id !== a.id);
        if (!datos.tasks[a.date].length) delete datos.tasks[a.date];
        if ((datos.tasks[a.date] || []).length !== antes) cambios++;
      } else if (a.type === 'toggle_task' && a.id && datos.tasks[a.date]) {
        const t = datos.tasks[a.date].find(x => x.id === a.id);
        if (t) { t.done = !t.done; cambios++; }
      } else if (a.type === 'add_note' && a.text) {
        (datos.notes[a.date] = datos.notes[a.date] || []).push({ id: uid(), text: String(a.text) });
        cambios++;
      } else if (a.type === 'remove_note' && a.id && datos.notes[a.date]) {
        datos.notes[a.date] = datos.notes[a.date].filter(n => n.id !== a.id);
        if (!datos.notes[a.date].length) delete datos.notes[a.date];
        cambios++;
      }
      } catch (e) { console.error('Acción fallida', a, e); }
    });
    return cambios;
  }

  function parsearJSON(txt) {
    if (!txt) return null;
    const limpio = txt.replace(/```json|```/g, '').trim();
    const i = limpio.indexOf('{');
    const f = limpio.lastIndexOf('}');
    const candidato = (i >= 0 && f > i) ? limpio.slice(i, f + 1) : limpio;
    try { return JSON.parse(candidato); } catch (e) {}
    try { return JSON.parse(candidato.replace(/\r?\n/g, ' ')); } catch (e) {}
    return null;
  }

  async function enviar() {
    const texto = inputChat.value.trim();
    if (!texto || btnEnviar.disabled) return;
    inputChat.value = '';
    btnEnviar.disabled = true;

    datos.chat.push({ role: 'user', content: texto });
    pintarMsg('usuario', texto);

    const cargando = document.createElement('div');
    cargando.className = 'escribiendo';
    cargando.innerHTML = 'La Esquina piensa<span>.</span><span>.</span><span>.</span>';
    mensajesEl.appendChild(cargando);
    mensajesEl.scrollTop = mensajesEl.scrollHeight;

    try {
      if (!PROXY_URL || PROXY_URL === 'PEGA_AQUI_TU_URL_DE_VALTOWN') {
        cargando.remove();
        pintarMsg('sistema', 'Falta configurar la dirección del proxy. Abre el archivo y pega la URL de tu Worker de Cloudflare en la configuración.');
        btnEnviar.disabled = false;
        return;
      }
      // Historial reciente para contexto conversacional + prompt con estado del calendario
      const historial = datos.chat.slice(-6, -1).map(m => ({ role: m.role, content: m.content }));
      const respuesta = await fetch(PROXY_URL, {
        method: 'POST',
        headers: {
          'content-type': 'application/json'
        },
        body: JSON.stringify({
          model: MODELO,
          max_tokens: 800,
          messages: [...historial, { role: 'user', content: construirPrompt(texto) }]
        })
      });
      const data = await respuesta.json();
      if (data.error) {
        cargando.remove();
        const msg = data.error.type === 'authentication_error'
          ? 'La clave no es válida. Revisa el secreto ANTHROPIC_API_KEY en Cloudflare.'
          : (data.error.type === 'rate_limit_error' || (data.error.message || '').includes('credit')
              ? 'Sin saldo o límite alcanzado. Recarga en console.anthropic.com.'
              : 'Error de la API: ' + (data.error.message || 'desconocido'));
        pintarMsg('sistema', msg);
        btnEnviar.disabled = false;
        return;
      }
      const textoRespuesta = (data.content || [])
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join('\n');

      let parseado = parsearJSON(textoRespuesta);
      if (!parseado) {
        const pareceJSON = textoRespuesta.trim().startsWith('{') || textoRespuesta.includes('"actions"');
        parseado = {
          reply: pareceJSON
            ? 'La respuesta llegó cortada y no he podido aplicar los cambios. Pídemelo de nuevo en partes más pequeñas (por ejemplo, día a día).'
            : (textoRespuesta || 'No he recibido respuesta. Inténtalo de nuevo.'),
          actions: []
        };
      }

      const cambios = aplicarAcciones(parseado.actions);
      const reply = (parseado.reply || 'Hecho.') + (cambios ? '' : '');
      datos.chat.push({ role: 'assistant', content: reply });

      cargando.remove();
      pintarMsg('claude', reply);
      if (cambios) {
        pintarMsg('sistema', '✓ Calendario actualizado (' + cambios + (cambios === 1 ? ' cambio' : ' cambios') + ')');
      }
      guardar();
      render();
    } catch (err) {
      cargando.remove();
      const msg = err.name === 'TypeError' || err.message.includes('fetch')
        ? 'Timeout: el servidor tardó demasiado. Intenta un comando más corto.'
        : 'Error de conexión. Comprueba tu red e inténtalo de nuevo.';
      pintarMsg('sistema', msg);
      console.error(err);
    } finally {
      btnEnviar.disabled = false;
    }
  }
  btnEnviar.addEventListener('click', enviar);
  inputChat.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
  });

  // ── Dictado por voz: mantener pulsado para hablar ──
  const btnMic = document.getElementById('btn-mic');
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    btnMic.addEventListener('click', () => {
      pintarMsg('sistema', 'Tu navegador no incluye dictado propio. Truco: toca el campo de texto y usa el micrófono del teclado del móvil — funciona igual.');
    });
  } else {
    let rec = null;
    let grabando = false;
    let transcripcion = '';
    let timerMic = null;

    const empezar = (e) => {
      e.preventDefault();
      if (grabando) return;
      transcripcion = '';
      inputChat.value = '';
      rec = new SR();
      rec.lang = 'es-ES';
      rec.interimResults = true;
      rec.continuous = false;
      rec.onresult = ev => {
        let final = '';
        let interim = '';
        for (let i = 0; i < ev.results.length; i++) {
          if (ev.results[i].isFinal) {
            final += ev.results[i][0].transcript;
          } else {
            interim += ev.results[i][0].transcript;
          }
        }
        transcripcion = (final + interim).trim();
        inputChat.value = transcripcion;
      };
      rec.onend = () => {
        clearTimeout(timerMic);
        grabando = false;
        btnMic.classList.remove('grabando');
        btnMic.textContent = '🎙';
        if (transcripcion.trim()) enviar();
      };
      rec.onerror = ev => {
        clearTimeout(timerMic);
        grabando = false;
        btnMic.classList.remove('grabando');
        btnMic.textContent = '🎙';
        if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') {
          pintarMsg('sistema', 'Permiso de micrófono denegado. Actívalo para este sitio en los ajustes del navegador.');
        }
      };
      grabando = true;
      btnMic.classList.add('grabando');
      btnMic.textContent = '●';
      timerMic = setTimeout(parar, 15000);
      try { rec.start(); } catch (err) {
        clearTimeout(timerMic);
        grabando = false;
        btnMic.classList.remove('grabando');
        btnMic.textContent = '🎙';
      }
    };
    const parar = () => {
      if (grabando && rec) { try { rec.stop(); } catch (e) {} }
    };

    btnMic.addEventListener('pointerdown', empezar);
    btnMic.addEventListener('pointerup', parar);
    btnMic.addEventListener('pointercancel', parar);
    btnMic.addEventListener('pointerleave', parar);
    btnMic.addEventListener('contextmenu', e => e.preventDefault());
  }

  cargar();
})();
</script>
